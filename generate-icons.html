<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标生成器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    .canvas-container {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .canvas-item {
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
    }
    button:hover {
      background: #45a049;
    }
    .info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>🎨 插件图标生成器</h1>
  
  <div class="info">
    <p>这个工具会生成三个尺寸的插件图标。点击下载按钮保存到 icons 文件夹。</p>
  </div>

  <div class="canvas-container">
    <div class="canvas-item">
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>16x16</p>
      <button onclick="downloadIcon('icon16', 'icon16.png')">下载</button>
    </div>
    <div class="canvas-item">
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>48x48</p>
      <button onclick="downloadIcon('icon48', 'icon48.png')">下载</button>
    </div>
    <div class="canvas-item">
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>128x128</p>
      <button onclick="downloadIcon('icon128', 'icon128.png')">下载</button>
    </div>
  </div>

  <button onclick="generateIcons()">🔄 重新生成</button>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      
      // 清空画布
      ctx.clearRect(0, 0, size, size);
      
      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // 绘制文字符号 "A"
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('A', size * 0.5, size * 0.5);
      
      // 绘制鼠标光标效果
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.beginPath();
      ctx.moveTo(size * 0.7, size * 0.3);
      ctx.lineTo(size * 0.7, size * 0.5);
      ctx.lineTo(size * 0.75, size * 0.48);
      ctx.lineTo(size * 0.8, size * 0.55);
      ctx.lineTo(size * 0.83, size * 0.52);
      ctx.lineTo(size * 0.78, size * 0.45);
      ctx.lineTo(size * 0.85, size * 0.45);
      ctx.closePath();
      ctx.fill();
      
      // 添加光晕效果
      ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
      ctx.shadowBlur = size * 0.1;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = size * 0.05;
      ctx.beginPath();
      ctx.arc(size * 0.5, size * 0.5, size * 0.35, 0, Math.PI * 2);
      ctx.stroke();
    }

    function generateIcons() {
      ['icon16', 'icon48', 'icon128'].forEach(id => {
        const canvas = document.getElementById(id);
        drawIcon(canvas);
      });
    }

    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 页面加载时生成图标
    window.onload = generateIcons;
  </script>
</body>
</html>
