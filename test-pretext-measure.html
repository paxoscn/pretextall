<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试 Pretext 测量功能</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .result {
      margin: 10px 0;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 3px;
      font-family: monospace;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h1>Pretext 测量功能测试</h1>
  
  <div class="test-section">
    <h2>测试 1: 基本空格测量</h2>
    <div id="test1" class="result">运行中...</div>
  </div>

  <div class="test-section">
    <h2>测试 2: 不同字体大小</h2>
    <div id="test2" class="result">运行中...</div>
  </div>

  <div class="test-section">
    <h2>测试 3: 中英文混合</h2>
    <div id="test3" class="result">运行中...</div>
  </div>

  <script type="module">
    import * as pretext from './pretext-lib/measurement.js';

    function runTests() {
      // 测试 1: 基本空格测量
      try {
        const ctx = pretext.getMeasureContext();
        ctx.font = '16px Arial';
        const spaceWidth = ctx.measureText(' ').width;
        document.getElementById('test1').innerHTML = 
          `<span class="success">✓ 成功</span><br>` +
          `空格宽度 (16px Arial): ${spaceWidth.toFixed(2)}px`;
      } catch (e) {
        document.getElementById('test1').innerHTML = 
          `<span class="error">✗ 失败: ${e.message}</span>`;
      }

      // 测试 2: 不同字体大小
      try {
        const ctx = pretext.getMeasureContext();
        const sizes = [12, 16, 20, 24];
        let results = '<span class="success">✓ 成功</span><br>';
        sizes.forEach(size => {
          ctx.font = `${size}px Arial`;
          const width = ctx.measureText(' ').width;
          results += `${size}px: ${width.toFixed(2)}px<br>`;
        });
        document.getElementById('test2').innerHTML = results;
      } catch (e) {
        document.getElementById('test2').innerHTML = 
          `<span class="error">✗ 失败: ${e.message}</span>`;
      }

      // 测试 3: 中英文混合
      try {
        const ctx = pretext.getMeasureContext();
        ctx.font = '16px Arial';
        const tests = [
          { text: ' ', label: '空格' },
          { text: 'a', label: '英文字母' },
          { text: '中', label: '中文字符' },
          { text: 'Hello', label: '英文单词' },
          { text: '你好', label: '中文词组' }
        ];
        let results = '<span class="success">✓ 成功</span><br>';
        tests.forEach(test => {
          const width = ctx.measureText(test.text).width;
          results += `${test.label} "${test.text}": ${width.toFixed(2)}px<br>`;
        });
        document.getElementById('test3').innerHTML = results;
      } catch (e) {
        document.getElementById('test3').innerHTML = 
          `<span class="error">✗ 失败: ${e.message}</span>`;
      }
    }

    // 等待 DOM 加载完成后运行测试
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', runTests);
    } else {
      runTests();
    }
  </script>
</body>
</html>
